name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/ tests/ scripts/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (RDKit tests auto-skip via skipif guards)
        run: |
          pytest tests/ -x -q --tb=short \
            --deselect tests/test_metrics.py \
            --deselect tests/test_molecular_metrics.py::TestFragmentSimilarity::test_identical_sets \
            --deselect tests/test_molecular_metrics.py::TestScaffoldSimilarity::test_identical_sets \
            --deselect tests/test_motif_aware_coarsening.py::TestMotifAffinityMatrix::test_single_motif_creates_clique \
            --deselect tests/test_motif_aware_coarsening.py::TestMotifAffinityMatrix::test_overlapping_motifs_additive

  smoke-train:
    name: Smoke Test – Train
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install rdkit

      - name: Smoke train HSENT (5 steps)
        run: |
          python scripts/train.py \
            tokenizer=hsent \
            trainer.max_steps=5 \
            trainer.devices=1 \
            trainer.accelerator=cpu \
            data.num_train=50 \
            data.num_val=10 \
            data.num_test=10 \
            sampling.num_samples=2 \
            sampling.max_length=128 \
            wandb.enabled=false

      - name: Smoke train HDTC (5 steps)
        run: |
          python scripts/train.py \
            tokenizer=hdtc \
            trainer.max_steps=5 \
            trainer.devices=1 \
            trainer.accelerator=cpu \
            data.num_train=50 \
            data.num_val=10 \
            data.num_test=10 \
            sampling.num_samples=2 \
            sampling.max_length=128 \
            wandb.enabled=false

  smoke-eval:
    name: Smoke Test – Generate & Validity
    runs-on: ubuntu-latest
    needs: smoke-train
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install rdkit fcd

      - name: Train tiny HSENT model
        run: |
          python scripts/train.py \
            tokenizer=hsent \
            trainer.max_steps=5 \
            trainer.devices=1 \
            trainer.accelerator=cpu \
            data.num_train=50 \
            data.num_val=10 \
            data.num_test=10 \
            sampling.num_samples=2 \
            sampling.max_length=128 \
            wandb.enabled=false

      - name: Eval HSENT (generate + validity only)
        run: |
          CKPT=$(find outputs/train -name "best.ckpt" | head -1)
          python scripts/test.py \
            tokenizer=hsent \
            model.checkpoint_path="$CKPT" \
            trainer.accelerator=cpu \
            data.num_train=50 \
            data.num_val=10 \
            data.num_test=10 \
            sampling.num_samples=5 \
            sampling.max_length=128 \
            metrics.core_only=true \
            metrics.compute_fcd=false \
            metrics.compute_pgd=false \
            metrics.compute_motif=false \
            visualization.enabled=false

      - name: Train tiny HDTC model
        run: |
          python scripts/train.py \
            tokenizer=hdtc \
            trainer.max_steps=5 \
            trainer.devices=1 \
            trainer.accelerator=cpu \
            data.num_train=50 \
            data.num_val=10 \
            data.num_test=10 \
            sampling.num_samples=2 \
            sampling.max_length=128 \
            wandb.enabled=false

      - name: Eval HDTC (generate + validity only)
        run: |
          CKPT=$(find outputs/train -name "best.ckpt" | sort | tail -1)
          python scripts/test.py \
            tokenizer=hdtc \
            model.checkpoint_path="$CKPT" \
            trainer.accelerator=cpu \
            data.num_train=50 \
            data.num_val=10 \
            data.num_test=10 \
            sampling.num_samples=5 \
            sampling.max_length=128 \
            metrics.core_only=true \
            metrics.compute_fcd=false \
            metrics.compute_pgd=false \
            metrics.compute_motif=false \
            visualization.enabled=false
