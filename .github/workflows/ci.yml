name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/ tests/ scripts/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only torch (faster than CUDA wheels)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install rdkit

      - name: Run tests (RDKit tests auto-skip via skipif guards)
        run: |
          pytest tests/ -x -q --tb=short \
            --deselect tests/test_metrics.py \
            --deselect tests/test_molecular_metrics.py::TestFragmentSimilarity::test_identical_sets \
            --deselect tests/test_molecular_metrics.py::TestScaffoldSimilarity::test_identical_sets \
            --deselect tests/test_motif_aware_coarsening.py::TestMotifAffinityMatrix::test_single_motif_creates_clique \
            --deselect tests/test_motif_aware_coarsening.py::TestMotifAffinityMatrix::test_overlapping_motifs_additive

  smoke-train:
    name: Smoke Test – Train & Eval
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only torch (faster than CUDA wheels)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install rdkit

      - name: Set up CI test data
        run: |
          mkdir -p data/moses
          cp data/ci_moses/train.csv data/moses/train.csv
          cp data/ci_moses/test.csv data/moses/test.csv

      - name: Smoke train SENT (2 steps, no generation)
        run: |
          python scripts/train.py \
            tokenizer=sent \
            model.model_name=gpt2-xxs \
            trainer.max_steps=2 \
            trainer.devices=1 \
            trainer.accelerator=cpu \
            data.num_train=10 \
            data.num_val=5 \
            data.num_test=5 \
            sampling.num_samples=0 \
            sampling.max_length=64 \
            wandb.enabled=false
