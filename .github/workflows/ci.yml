name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/ tests/ scripts/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only torch (faster than CUDA wheels)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install rdkit

      - name: Run tests (RDKit tests auto-skip via skipif guards)
        run: |
          pytest tests/ -x -q --tb=short \
            --deselect tests/test_metrics.py \
            --deselect tests/test_molecular_metrics.py::TestFragmentSimilarity::test_identical_sets \
            --deselect tests/test_molecular_metrics.py::TestScaffoldSimilarity::test_identical_sets \
            --deselect tests/test_motif_aware_coarsening.py::TestMotifAffinityMatrix::test_single_motif_creates_clique \
            --deselect tests/test_motif_aware_coarsening.py::TestMotifAffinityMatrix::test_overlapping_motifs_additive
