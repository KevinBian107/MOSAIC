# @package _global_

defaults:
  - _self_
  - experiment: moses

# Random seed
seed: 42

# Model configuration
model:
  model_name: gpt2-xs
  learning_rate: 6e-4
  weight_decay: 0.1
  warmup_steps: 1000
  max_steps: ${trainer.max_steps}

# Data configuration
data:
  dataset_name: moses  # 'moses' or 'qm9'
  batch_size: 32
  num_workers: 0
  num_train: 10000  # Use null for full dataset
  num_val: 1000
  num_test: 1000
  include_hydrogens: false
  data_root: data

# Tokenizer configuration
tokenizer:
  type: sent  # 'sent' (flat SENT) or 'hsent' (hierarchical H-SENT)
  max_length: -1
  truncation_length: 2048
  undirected: true
  labeled_graph: true  # Enable labeled SENT (encode atom/bond types for molecules)

# Training configuration
trainer:
  max_steps: 100000
  val_check_interval: 1000
  precision: 32
  gradient_clip_val: 1.0
  accelerator: auto
  devices: 1

# Sampling configuration for evaluation
sampling:
  num_samples: 100
  batch_size: 32
  top_k: 10
  temperature: 1.0
  max_length: 2048

# Logging configuration
logs:
  path: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# Weights & Biases configuration
wandb:
  enabled: false
  project: molecular-graph-gen
  entity: null  # Your WandB username or team name
  name: null  # Run name (auto-generated if null)
  tags: []  # List of tags for filtering runs
  notes: null  # Notes about this run
  log_model: true  # Log model checkpoints as artifacts
  log_graphs: true  # Log generated molecule visualizations
  log_freq: 1000  # How often to log (in steps)
