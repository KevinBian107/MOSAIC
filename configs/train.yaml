# @package _global_

defaults:
  - experiment: moses
  - tokenizer: hdtc    # Options: sent, hsent, hdt, hdtc
  - _self_  # Applied last so train.yaml settings override experiment defaults

# Random seed
seed: 42

# Auto-resume from checkpoint if available (set to false to start fresh)
resume: false

# Model configuration
model:
  model_name: gpt2-xs
  learning_rate: 6e-4
  weight_decay: 0.1
  warmup_steps: 1000
  max_steps: ${trainer.max_steps}

# Data configuration
data:
  dataset_name: moses  # 'moses' or 'qm9'
  batch_size: 32
  num_workers: 8  # Must be 0 for SENT tokenizer (Cython multiprocessing issue)
  num_train: 500000  # Use null for full dataset
  num_val: 1000
  num_test: 1000
  include_hydrogens: false
  data_root: data
  use_cache: true  # Set to true to use preprocessed cached data
  cache_dir: data/cache  # Directory for cached tokenized data

# Training configuration
trainer:
  max_steps: 250000
  val_check_interval: 1000
  precision: 32
  gradient_clip_val: 1.0
  accelerator: auto
  devices: 1

# Sampling configuration for evaluation
sampling:
  num_samples: 100
  batch_size: 32
  top_k: 10
  temperature: 1.0
  max_length: 2048

# Logging configuration
logs:
  base_dir: outputs/train
  run_name: ${data.dataset_name}_${tokenizer.type}_n${data.num_train}
  path: ${logs.base_dir}/${logs.run_name}_${now:%Y%m%d-%H%M%S}

# Weights & Biases configuration
wandb:
  enabled: true
  project: molecular-graph-gen
  entity: null  # Your WandB username or team name
  name: null  # Run name (auto-generated if null)
  tags: []  # List of tags for filtering runs
  notes: null  # Notes about this run
  log_model: true  # Log model checkpoints as artifacts
  log_graphs: true  # Log generated molecule visualizations

  # Enhanced molecule visualization with color-coded motif highlighting
  max_logged_molecules: 12  # Number of molecules to visualize in WandB

  # Intermediate evaluation during training (set to 0 to disable)
  eval_every_n_val: 250  # Run generation eval every N validation epochs
  eval_num_samples: 5  # Number of molecules to generate per intermediate eval
