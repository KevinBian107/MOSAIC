# @package _global_
#
# Scaffold-Primed Generation Evaluation Configuration
#
# Evaluate scaffold priming using complex natural products from COCONUT.
# Extracts Murcko scaffolds, primes the model, and evaluates generation quality.
#
# Usage:
#   # Prepare data (one-time)
#   python scripts/prepare_coconut_data.py
#
#   # Run evaluation
#   python scripts/primed_gen.py
#
#   # Customize evaluation
#   python scripts/primed_gen.py \
#       data_source.n_molecules=100 \
#       evaluation.samples_per_molecule=10

defaults:
  - /experiment: moses
  - /tokenizer: hdtc
  - _self_

# Random seed
seed: 42

# Model configuration
model:
  checkpoint_path: outputs/benchmark/moses_hdtc_n500000_20260129-171812/best.ckpt

# Data source configuration (COCONUT natural products)
data_source:
  data_file: data/coconut_complex.smi  # Generated by prepare_coconut_data.py
  n_molecules: 100        # Number of molecules to evaluate
  min_atoms: 20           # Minimum atoms for filtering
  max_atoms: 100          # Maximum atoms for filtering
  min_rings: 3            # Minimum rings for filtering
  min_scaffold_atoms: 10  # Minimum scaffold atoms for filtering

# Evaluation configuration
evaluation:
  samples_per_molecule: 10  # Samples to generate per scaffold
  metrics:                  # Metrics to compute
    - scaffold_preservation
    - tanimoto
    - validity
    - size_ratio

# Generation configuration
generation:
  batch_size: 32          # Batch size for generation

# Sampling configuration
sampling:
  top_k: 10
  temperature: 1.0
  max_length: 2048
  min_new_tokens: 50  # Minimum tokens to generate beyond primer (encourages longer molecules)
  primer_fraction: 0.5  # Fraction of scaffold to use as primer (0.0=minimal, 1.0=full scaffold)
                        # Lower values give model more "room" to generate beyond scaffold

# Output configuration
output:
  save_smiles: true       # Save generated SMILES to file
  save_evaluation: true   # Save evaluation results to JSON
  visualize: true         # Generate comparison visualizations

# Logging configuration
logs:
  base_dir: outputs/primed_gen
  run_name: ${data.dataset_name}_${tokenizer.type}
  path: ${logs.base_dir}/${logs.run_name}_${now:%Y%m%d-%H%M%S}
