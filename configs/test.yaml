# @package _global_

defaults:
  - experiment: moses
  - tokenizer: sent    # Options: sent, hsent, hsent_motif
  - _self_  # Must be last to override experiment defaults

# Random seed
seed: 42

# Model configuration
model:
  checkpoint_path: null  # Required: path to model checkpoint
  is_autograph: false  # Set to true for AutoGraph checkpoints (auto-detected if false)

# Data configuration
data:
  dataset_name: moses  # 'moses' or 'qm9'
  batch_size: 32
  num_workers: 0
  num_train: 100  # Used for reference in metrics
  num_val: 100
  num_test: 100
  include_hydrogens: false
  data_root: data

# Sampling configuration
sampling:
  num_samples: 100  # -1 to use all test set
  batch_size: 32
  top_k: 10
  temperature: 1.0
  max_length: 2048

# Metrics configuration
metrics:
  compute_motif: true  # Compute motif distribution metrics (MSC, MFD)
  compute_fcd: true  # Requires moses or fcd package
  compute_pgd: true  # Requires polygraph-benchmark package
  pgd_reference_size: 10000  # Max number of reference molecules for PGD (memory constraint)

# Visualization configuration
visualization:
  enabled: true  # Set to true to generate molecule visualizations
  max_molecules: 12  # Maximum number of molecules to visualize
  dpi: 150  # DPI for saved images

# Logging configuration
logs:
  base_dir: outputs/test
  run_name: ${data.dataset_name}_${tokenizer.type}_gen${sampling.num_samples}
  path: ${logs.base_dir}/${logs.run_name}_${now:%Y%m%d-%H%M%S}
