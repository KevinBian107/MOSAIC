# @package _global_

defaults:
  - experiment: moses
  - tokenizer: hsent    # Options: sent, hsent, hdt, hdtc
  - _self_  # Must be last to override experiment defaults

# Random seed
seed: 42

# Model configuration
model:
  checkpoint_path: outputs/train/moses_hsent_andrew/best.ckpt
  # outputs/train/moses_hdtc_n100000_20260126-204311/best.ckpt
  # outputs/train/moses_hdt_n1000000_20260125-233951/best.ckpt
  # outputs/train/moses_hsent_n50000_20260122-093526/best.ckpt
  # outputs/train/moses_sent_n1000000_20260123-140906/best.ckpt
  is_autograph: false  # Set to true for AutoGraph checkpoints (auto-detected if false)

# Data configuration (dataset_name comes from experiment config)
data:
  batch_size: 32
  num_workers: 0
  include_hydrogens: false
  data_root: data

# Sampling configuration
sampling:
  num_samples: 500  # -1 to use all test set (number of molecules to generate for metrics)
  batch_size: 32
  top_k: 10
  temperature: 1.0
  max_length: 2048

# Metrics configuration
metrics:
  compute_motif: true  # Compute motif distribution metrics (MSC, MFD)
  compute_fcd: true  # Requires moses or fcd package
  compute_pgd: true  # Requires polygraph-benchmark package
  pgd_reference_size: 100  # Max number of reference molecules for PGD (memory constraint)
  reference_size: 100000  # Max reference set size for FCD, molecular, and motif metrics

# Visualization configuration
visualization:
  enabled: true  # Set to true to generate molecule visualizations
  max_molecules: 12  # Maximum number of molecules to visualize
  dpi: 150  # DPI for saved images

# Logging configuration
logs:
  base_dir: outputs/test
  run_name: ${data.dataset_name}_${tokenizer.type}_gen${sampling.num_samples}
  path: ${logs.base_dir}/${logs.run_name}_${now:%Y%m%d-%H%M%S}
