# @package _global_

defaults:
  - tokenizer: hsent    # Options: sent, hsent, hdt, hdtc
  - _self_
  - experiment: moses  # Applied last so experiment can override

# Random seed
seed: 42

# Model configuration
model:
  checkpoint_path: outputs/train/moses_hsent_andrew/best.ckpt
  is_autograph: false  # Set to true for AutoGraph checkpoints (auto-detected if false)

# Data configuration (dataset_name comes from experiment config)
data:
  batch_size: 32
  num_workers: 0
  include_hydrogens: false
  data_root: data
  # Load from single precomputed file (run scripts/preprocess/export_moses_smiles.py once → data/moses_smiles/moses_smiles.txt)
  use_precomputed_smiles: true
  precomputed_smiles_dir: data/moses_smiles

# Sampling configuration
sampling:
  num_samples: 1000  # -1 to use all test set (number of molecules to generate for metrics)
  batch_size: 32
  top_k: 10
  temperature: 1.0
  max_length: 512

# Metrics configuration
metrics:
  core_only: false  # If true, only compute core metrics: validity, uniqueness, novelty (no FCD, PGD, motif)
  compute_motif: true  # Compute motif distribution metrics (MSC, MFD)
  compute_fcd: true  # Requires moses or fcd package
  compute_pgd: true  # Requires polygraph-benchmark package
  pgd_reference_size: 1000  # Should be >= sampling.num_samples to use all generated; PGD needs equal ref/gen counts
  reference_size: null  # Auto: 10% of train size (sampled from test when reference_split='test')
  reference_split: "test"  # Reference population: "test" (default) or "full" (train+test combined)
  reference_graphs_path: null  # If set, load PGD reference graphs from this .pt file (skip SMILES->graph conversion)
  motif_cache_dir: data/motif_cache  # Cache reference motif features here (null = disable); reused across model runs
  motif_n_workers: null  # Processes for motif feature extraction (null/1 = serial; integer > 1 = parallel)

# Visualization configuration
visualization:
  enabled: true  # Set to true to generate molecule visualizations
  max_molecules: 12  # Maximum number of molecules to visualize
  dpi: 150  # DPI for saved images

# Logging configuration
logs:
  base_dir: outputs/test
  run_name: ${data.dataset_name}_${tokenizer.type}_gen${sampling.num_samples}
  path: ${logs.base_dir}/${logs.run_name}_${now:%Y%m%d-%H%M%S}
