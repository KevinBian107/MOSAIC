# @package _global_

defaults:
  - /tokenizer: hdt
  - _self_
  - /experiment: moses  # Applied last so experiment can override

# Random seed
seed: 42

# Model configuration
model:
  checkpoint_path: outputs/train/moses_hdt_andrew/best.ckpt

# Data configuration (dataset_name comes from experiment config)
data:
  batch_size: 32
  num_workers: 0
  include_hydrogens: false
  data_root: data
  # Optional: load from precomputed SMILES file (e.g. data/moses_smiles/moses_smiles.txt)
  use_precomputed_smiles: true
  precomputed_smiles_dir: data/moses_smiles

# Generation configuration
generation:
  num_samples: 1000
  batch_size: 32

# Sampling configuration
sampling:
  top_k: 10
  temperature: 1.0
  max_length: 512

# Metrics configuration
metrics:
  reference_split: "test"  # Reference population: "test" (default) or "full" (train+test combined)
  reference_size: 5000     # Max reference molecules for analysis (avoids slow RDKit on 500K MOSES)

# Analysis configuration
analysis:
  motif_smiles: "c1ccccc1"  # Motif to analyze (default: benzene)

# Logging configuration
logs:
  base_dir: outputs/realistic_gen
  run_name: ${data.dataset_name}_${tokenizer.type}
  path: ${logs.base_dir}/${logs.run_name}_${now:%Y%m%d-%H%M%S}
