# @package _global_

# MOSES dataset experiment configuration
# Drug-like molecules from ZINC database

data:
  dataset_name: moses
  num_train: 500000  # Use null for full 1.6M training set
  num_val: 1000
  num_test: 1000
  include_hydrogens: false

trainer:
  max_steps: 250000
  val_checks_per_epoch: 5
  validate_every_n_epochs: 1

tokenizer:
  truncation_length: 512  # MOSES preference

sampling:
  num_samples: 1000
  top_k: 10
