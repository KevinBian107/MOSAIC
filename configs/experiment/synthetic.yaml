# @package _global_

# Synthetic graph experiment configuration
# Uses NetworkX generators with motif detection

data:
  generators:
    - name: erdos_renyi
      n: 50
      p: 0.2
    - name: barabasi_albert
      n: 50
      m: 3
  num_train: 1000
  num_val: 100
  num_test: 100

# Use smaller model for synthetic experiments
model:
  model_name: gpt2-xs
  learning_rate: 6e-4

# Shorter training for synthetic data
trainer:
  max_steps: 50000
  val_check_interval: 500

# Evaluate all standard and motif metrics
metrics:
  compute_emd: false
  metrics_list:
    - degree
    - spectral
    - clustering
  motif_types:
    - TRIANGLE
    - FOUR_CYCLE
    - STAR

# WandB configuration for this experiment
wandb:
  tags:
    - synthetic
    - baseline
