# DDP Training Configuration Examples
# Use these as reference or override parameters from command line
#
# Usage examples:
#   python scripts/train.py --config-name=train_ddp_2gpu
#   python scripts/train.py trainer.devices=2 data.batch_size=64 model.learning_rate=1.2e-3

# ==============================================================================
# SINGLE GPU BASELINE (batch=32)
# ==============================================================================
# defaults:
#   - train
#
# trainer:
#   devices: 1
# data:
#   batch_size: 32
# model:
#   learning_rate: 6e-4
#   warmup_steps: 1000
# trainer:
#   max_steps: 250000
#
# Effective batch: 32
# Expected time: ~12-16 hours on A5000

# ==============================================================================
# SINGLE GPU OPTIMIZED (batch=128)
# ==============================================================================
# defaults:
#   - train
#
# trainer:
#   devices: 1
# data:
#   batch_size: 128
# model:
#   learning_rate: 1.2e-3  # 2x scaling (sqrt(4) = 2)
#   warmup_steps: 2000     # 2x scaling
# trainer:
#   max_steps: 62500       # 4x fewer steps (same total samples)
#
# Effective batch: 128
# Expected time: ~6-8 hours on A5000
# NOTE: Test quality first! Large batch may hurt generalization.

# ==============================================================================
# 2 GPU DDP (batch=32 per GPU, conservative)
# ==============================================================================
# defaults:
#   - train
#
# trainer:
#   devices: 2
#   strategy: ddp
# data:
#   batch_size: 32
# model:
#   learning_rate: 8.5e-4  # sqrt(2) scaling
#   warmup_steps: 1414     # sqrt(2) scaling
# trainer:
#   max_steps: 125000      # 2x fewer steps
#
# Effective batch: 64 (32 × 2)
# Expected time: ~7-9 hours on 2x A5000
# Speedup: ~1.8x over single GPU

# ==============================================================================
# 2 GPU DDP (batch=64 per GPU, recommended)
# ==============================================================================
# defaults:
#   - train
#
# trainer:
#   devices: 2
#   strategy: ddp
# data:
#   batch_size: 64
# model:
#   learning_rate: 1.2e-3  # 2x scaling (sqrt(4) = 2)
#   warmup_steps: 2000     # 2x scaling
# trainer:
#   max_steps: 62500       # 4x fewer steps
#
# Effective batch: 128 (64 × 2)
# Expected time: ~4-5 hours on 2x A5000
# Speedup: ~1.8x over single GPU @ batch=128
# NOTE: Most cost-efficient for cloud GPUs!

# ==============================================================================
# 4 GPU DDP (batch=32 per GPU)
# ==============================================================================
# defaults:
#   - train
#
# trainer:
#   devices: 4
#   strategy: ddp
# data:
#   batch_size: 32
# model:
#   learning_rate: 1.2e-3  # 2x scaling (sqrt(4) = 2)
#   warmup_steps: 2000     # 2x scaling
# trainer:
#   max_steps: 62500       # 4x fewer steps
#
# Effective batch: 128 (32 × 4)
# Expected time: ~3-4 hours on 4x A5000
# Speedup: ~3.2x over single GPU
# NOTE: Diminishing returns due to communication overhead

# ==============================================================================
# QUICK OVERRIDE EXAMPLES (command line)
# ==============================================================================
#
# Test DDP on small dataset (10K steps):
#   python scripts/train.py trainer.devices=2 trainer.strategy=ddp \
#     data.num_train=10000 trainer.max_steps=10000
#
# 2 GPU DDP with balanced settings:
#   python scripts/train.py trainer.devices=2 data.batch_size=64 \
#     model.learning_rate=1.2e-3 model.warmup_steps=2000 trainer.max_steps=62500
#
# Maximum throughput (single GPU, large batch):
#   python scripts/train.py data.batch_size=256 \
#     model.learning_rate=1.7e-3 model.warmup_steps=2828 trainer.max_steps=31250
#
# Gradient accumulation (simulate large batch on small GPU):
#   python scripts/train.py data.batch_size=32 trainer.accumulate_grad_batches=4 \
#     model.learning_rate=1.2e-3 model.warmup_steps=2000

# ==============================================================================
# BATCH SIZE SCALING REFERENCE
# ==============================================================================
#
# | Batch | LR       | Warmup | Max Steps | Scaling Rule  |
# |-------|----------|--------|-----------|---------------|
# | 32    | 6e-4     | 1000   | 250K      | baseline      |
# | 64    | 8.5e-4   | 1414   | 125K      | sqrt(2)       |
# | 128   | 1.2e-3   | 2000   | 62.5K     | 2x (sqrt(4))  |
# | 256   | 1.7e-3   | 2828   | 31.25K    | sqrt(8)       |
# | 512   | 2.4e-3   | 4000   | 15.625K   | 4x (sqrt(16)) |
#
# LR Scaling: new_lr = base_lr × sqrt(new_batch / base_batch)
# Steps Scaling: new_steps = base_steps × (base_batch / new_batch)
