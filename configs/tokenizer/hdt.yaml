# HDT (Hierarchical DFS-based Tokenizer) configuration
#
# HDT is a simplified DFS-based tokenization scheme that achieves ~45% token
# reduction over H-SENT by:
# - Using ENTER/EXIT tokens to encode hierarchy structure implicitly via DFS nesting
# - Eliminating bipartite blocks - cross-community edges become back-edges
# - Using a smaller vocabulary (IDX_OFFSET=7 vs 11)
#
# Usage:
#   python scripts/train.py tokenizer=hdt
#   python scripts/train.py tokenizer=hdt tokenizer.coarsening_strategy=motif_aware_spectral

# Tokenizer type identifier
type: hdt

# Sequence length settings
max_length: -1              # Maximum sequence length (-1 for unlimited)
truncation_length: 2048     # Truncate sequences longer than this

# Node ordering within partitions
# Options: BFS, DFS, BFSAC (ascending cutset), BFSDC (descending cutset)
node_order: BFS

# Coarsening settings
min_community_size: 4       # Minimum nodes before stopping recursion

# Coarsening strategy
# Options:
#   - spectral: Standard spectral clustering (default)
#   - motif_aware_spectral: Spectral clustering with motif preservation
#   - motif_community: Direct motif-based community assignment (not yet implemented)
coarsening_strategy: motif_community

# Motif-aware coarsening settings (only used with motif-aware strategies)
motif_alpha: 1.0            # Weight for motif affinity (higher = stronger preservation)
                            # alpha=0: standard spectral clustering
                            # alpha=1: motif edges weighted equally to graph edges
                            # alpha=2-5: moderate motif preference
                            # alpha=10+: strong motif preservation

normalize_by_motif_size: false  # Normalize motif contribution by 1/motif_size
                                # Prevents large motifs from dominating

# Labeled graph support (encode atom/bond types for molecules)
labeled_graph: true
