name: mosaic-eval
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - numpy<2.0
  - scipy
  - rdkit=2024.03.6
  - networkx

  - pip:
    # Core torch stack (CPU-only by default; no CUDA pins)

    # Core project deps needed to load models and run test.py
    - hydra-core==1.3.2
    - lightning==2.4.0
    - transformers==4.44.0
    - cython==3.0.11
    - matplotlib
    - pyprojroot
    - pyemd==1.0.0
    - PyGSP==0.5.1
    - joblib
    - wandb

    # Evaluation metrics
    - fcd
    - polygraph-benchmark

    # Other utilities
    - scikit-learn
    - python-louvain

    # Testing
    - pytest
    - pytest-cov
