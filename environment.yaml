name: mosaic
channels:
  - conda-forge
dependencies:
  - python>=3.9
  - pip
  - numpy
  - scipy
  - rdkit=2024.03.6
  - networkx
  - pip:
    - torch==2.2.2
    - torch_geometric
    - hydra-core
    - lightning
    - transformers
    - cython
    - matplotlib
    - pyprojroot
    - pyemd==1.0.0
    - PyGSP==0.5.1
    - joblib
    - wandb
    - molsets  # MOSES benchmark package
    - fcd  # Frechet ChemNet Distance (optional, for FCD metric)
    - scikit-learn  # For SpectralClustering in hierarchical tokenization
    - python-louvain  # For modularity computation in graph coarsening
    - pytest  # Testing framework
    - pytest-cov  # Coverage reporting
